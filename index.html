<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>เกมเรียงคำมหัศจรรย์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#FF6FA5; --yellow:#FFD166; --blue:#4EC5F1; --green:#7ED957;
    --purple:#B48CFF; --orange:#FF9A5A; --bg1:#FFF6E9; --bg2:#E8F7FF;
    --ink:#4A3B32; --coral:#FF8B94; --teal:#4ED8C0; --gold:#FFB84D;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-family:inherit;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:'Mali','TH Sarabun New',sans-serif;
    background: radial-gradient(circle at 20% 10%, var(--bg2), var(--bg1) 60%);
    overflow-x:hidden; color:var(--ink);
    -webkit-user-select:none; user-select:none;
  }
  .screen{ display:none; min-height:100vh; padding:16px; flex-direction:column; align-items:center; }
  .screen.active{ display:flex; }

  h1{ font-size:clamp(28px,6vw,44px); color:var(--pink); text-shadow:2px 2px 0 #fff, 4px 4px 0 rgba(0,0,0,0.08); margin:8px 0; text-align:center; }
  h2{ font-size:clamp(20px,4vw,28px); margin:6px 0 14px; text-align:center; }

  .bigbtn{
    font-family:inherit; font-weight:700; font-size:20px; color:#fff;
    background:var(--pink); border:none; border-radius:20px;
    padding:14px 28px; box-shadow:0 6px 0 rgba(0,0,0,0.15);
    cursor:pointer; transition:transform .08s;
  }
  .bigbtn:active{ transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,0.15); }

  /* ---- Mascot select ---- */
  .mascot-row{ display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin:20px 0; }
  .mascot-opt{
    font-size:56px; background:#fff; border-radius:24px; padding:14px 18px;
    border:5px solid transparent; cursor:pointer; box-shadow:0 5px 0 rgba(0,0,0,0.1);
    transition:transform .12s;
  }
  .mascot-opt:hover{ transform:scale(1.08); }
  .mascot-opt.selected{ border-color:var(--green); background:#EBFFEA; }

  /* ---- Word grid ---- */
  .topbar{ width:100%; max-width:720px; display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .score-pill{ background:#fff; border-radius:30px; padding:8px 16px; font-weight:700; font-size:18px; box-shadow:0 4px 0 rgba(0,0,0,0.08); }
  .mascot-badge{ font-size:34px; }

  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(88px,1fr));
    gap:12px; width:100%; max-width:760px; margin-top:10px;
  }
  .word-card{
    background:#fff; border-radius:18px; padding:10px 6px 8px; text-align:center;
    cursor:pointer; box-shadow:0 5px 0 rgba(0,0,0,0.10); border:4px solid var(--card-color,#fff);
    transition:transform .1s;
    position:relative;
  }
  .word-card:hover{ transform:translateY(-3px) scale(1.03); }
  .word-card .emoji{ font-size:38px; display:block; }
  .word-card .star{ position:absolute; top:-10px; right:-6px; font-size:20px; }

  .cat-title{ width:100%; max-width:760px; font-size:18px; font-weight:800; margin:14px 0 4px; color:var(--purple); }

  /* ---- Game screen ---- */
  .game-wrap{ width:100%; max-width:640px; display:flex; flex-direction:column; align-items:center; }
  .mascot-big{ font-size:64px; margin-bottom:4px; }
  .speech{ background:#fff; border-radius:16px; padding:8px 16px; font-weight:700; font-size:18px; min-height:28px; box-shadow:0 3px 0 rgba(0,0,0,0.08); margin-bottom:10px; text-align:center;}
  .prompt-emoji{
    font-size:clamp(70px,18vw,110px); background:#fff; border-radius:32px; padding:14px 30px;
    box-shadow:0 8px 0 rgba(0,0,0,0.1); margin-bottom:16px;
  }
  .listen-btn{ background:var(--blue); margin-bottom:14px; }

  .slots{ display:flex; gap:16px; margin-bottom:22px; flex-wrap:wrap; justify-content:center; }
  .slot{
    width:58px; height:64px; background:#fff; border:3px dashed #ccc; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    font-size:30px; font-weight:800; margin:0 2px;
  }
  .slot.filled{ border-style:solid; border-color:var(--green); background:#EBFFEA; }
  .slot.hint{ border-style:solid; border-color:var(--purple); background:#F3EEFF; color:var(--purple); }

  .tiles{ display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin-bottom:18px; }
  .tile{
    width:58px; height:64px; font-size:30px; font-weight:800; color:var(--ink);
    background:var(--yellow); border:none; border-radius:14px; cursor:pointer;
    box-shadow:0 5px 0 rgba(0,0,0,0.15); transition:transform .08s;
  }
  .tile:active{ transform:translateY(4px); box-shadow:0 1px 0 rgba(0,0,0,0.15); }
  .tile.used{ visibility:hidden; }

  .controls-row{ display:flex; gap:10px; margin-top:6px; flex-wrap:wrap; justify-content:center; }
  .back-btn{ background:#B0B0B0; }
  .clear-btn{ background:var(--orange); }

  /* Confetti */
  .confetti{ position:fixed; top:-20px; width:10px; height:16px; border-radius:3px; z-index:999; }

  @keyframes fall{
    to{ transform:translateY(110vh) rotate(360deg); opacity:0.9; }
  }
  @keyframes pop{
    0%{ transform:scale(0.6); opacity:0;} 60%{ transform:scale(1.15);} 100%{ transform:scale(1); opacity:1;}
  }
  .pop-in{ animation:pop .35s ease-out; }

  @keyframes shake{
    10%,90%{ transform:translateX(-4px);} 20%,80%{ transform:translateX(6px);}
    30%,50%,70%{ transform:translateX(-8px);} 40%,60%{ transform:translateX(8px);}
  }
  .shake{ animation:shake .5s; }

  /* ---- Spot-the-picture game ---- */
  .spot-word{
    font-size:clamp(36px,9vw,64px); font-weight:800; color:var(--pink); background:#fff;
    border-radius:24px; padding:14px 36px; box-shadow:0 6px 0 rgba(0,0,0,0.1);
    margin:8px 0 26px; text-align:center;
  }
  .spot-row{ display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
  .spot-card{
    width:150px; height:170px; background:#fff; border-radius:24px; border:5px solid #eee;
    display:flex; align-items:center; justify-content:center; font-size:80px;
    cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,0.12); transition:transform .1s;
  }
  .spot-card:hover{ transform:translateY(-4px) scale(1.03); }
  .spot-card:active{ transform:translateY(3px); box-shadow:0 2px 0 rgba(0,0,0,0.12); }
  .spot-card.is-correct{ border-color:var(--green); background:#EBFFEA; }
  .spot-card.is-wrong{ border-color:#FF6B6B; background:#FFECEC; }
  .spot-done{ font-size:clamp(24px,5vw,34px); font-weight:800; text-align:center; margin:20px 0; }

  /* ---- Spot-the-difference game ---- */
  .diff-wrap{ display:flex; gap:16px; flex-wrap:wrap; justify-content:center; width:100%; max-width:760px; }
  .diff-panel{
    position:relative; width:min(320px,44vw); aspect-ratio:1/1;
    background:linear-gradient(180deg,#BEE7FF 0%,#EAFBE0 65%,#CFF0B0 100%);
    border-radius:24px; border:4px solid #fff; box-shadow:0 6px 0 rgba(0,0,0,0.1);
    overflow:hidden;
  }
  .diff-item{ position:absolute; transform:translate(-50%,-50%); text-align:center; line-height:1.1; user-select:none; }
  .diff-item-label{
    display:block; font-size:11px; font-weight:800; color:var(--ink);
    background:rgba(255,255,255,0.85); border-radius:6px; padding:1px 4px;
    margin-top:2px; white-space:nowrap;
  }
  .diff-hotspot{
    position:absolute; width:15%; height:15%; min-width:34px; min-height:34px;
    border-radius:50%; cursor:pointer; transform:translate(-50%,-50%);
  }
  .diff-hotspot.found{ background:rgba(126,217,87,0.4); border:3px solid var(--green); }

  footer{ margin-top:auto; padding-top:18px; font-size:12px; color:#999; text-align:center; }
</style>
</head>
<body>

<!-- SCREEN 1: mascot select -->
<div class="screen active" id="screen-mascot">
  <h1>🎈 เกมเรียงคำมหัศจรรย์ 🎈</h1>
  <h2>หนูอยากให้เพื่อนตัวไหนไปเล่นด้วยกันจ๊ะ?</h2>
  <div class="mascot-row" id="mascotRow"></div>
  <button class="bigbtn" id="startBtn" style="margin-top:10px;">เริ่มเล่นกันเลย! 🚀</button>
  <button class="bigbtn" id="spotStartBtn" style="margin-top:10px; background:var(--teal);">🔍 เกมจับผิด ทายภาพ</button>
  <button class="bigbtn" id="diffStartBtn1" style="margin-top:10px; background:var(--purple);">🕵️ จับผิดภาพ ด่าน 1 (ง่าย)</button>
  <button class="bigbtn" id="diffStartBtn2" style="margin-top:10px; background:#8B6FCE;">🕵️ จับผิดภาพ ด่าน 2 (ยาก)</button>
</div>

<!-- SCREEN 2: word grid -->
<div class="screen" id="screen-grid">
  <div class="topbar">
    <div class="mascot-badge" id="gridMascot"></div>
    <h1 style="font-size:26px; margin:0;">เลือกคำที่อยากเล่น</h1>
    <div class="score-pill">⭐ <span id="scoreCount">0</span>/<span id="totalCount1">20</span></div>
  </div>
  <div id="gridContainer" style="width:100%; max-width:760px;"></div>
</div>

<!-- SCREEN 3: game -->
<div class="screen" id="screen-game">
  <div class="topbar">
    <button class="bigbtn back-btn" id="backBtn">⬅ กลับ</button>
    <div class="score-pill">⭐ <span id="scoreCountGame">0</span>/<span id="totalCount2">20</span></div>
  </div>
  <div class="game-wrap">
    <div class="mascot-big" id="gameMascot"></div>
    <div class="speech" id="speechBubble">เรียงตัวอักษรให้ถูกนะจ๊ะ!</div>
    <div class="prompt-emoji pop-in" id="promptEmoji"></div>
    <button class="bigbtn listen-btn" id="listenBtn">🔊 ฟังคำนี้</button>
    <div class="slots" id="slots"></div>
    <div class="tiles" id="tiles"></div>
    <div class="controls-row">
      <button class="bigbtn clear-btn" id="clearBtn">↺ เริ่มใหม่</button>
    </div>
  </div>
</div>

<!-- SCREEN 4: spot-the-picture game -->
<div class="screen" id="screen-spot">
  <div class="topbar">
    <button class="bigbtn back-btn" id="spotBackBtn">⬅ กลับ</button>
    <div class="score-pill">🎯 <span id="spotLevelNum">1</span>/<span id="spotLevelTotal">10</span></div>
  </div>
  <div class="game-wrap">
    <div class="mascot-big" id="spotMascot"></div>
    <div class="speech" id="spotSpeech">คำนี้คือรูปไหนนะ?</div>
    <div id="spotBody"></div>
  </div>
</div>

<!-- SCREEN 5: spot-the-difference game -->
<div class="screen" id="screen-diff">
  <div class="topbar">
    <button class="bigbtn back-btn" id="diffBackBtn">⬅ กลับ</button>
    <div class="score-pill">🔎 <span id="diffFound">0</span>/<span id="diffTotal">7</span></div>
  </div>
  <div class="game-wrap">
    <h2 id="diffGameLabel" style="margin:2px 0;">จับผิดภาพ ด่านที่ 1</h2>
    <div style="font-weight:700; color:var(--purple); margin-bottom:8px;">ด่านย่อยที่ <span id="diffLevelNum">1</span>/10 · <span id="diffCatLabel"></span></div>
    <div class="speech" id="diffSpeech">หาจุดที่ไม่เหมือนกัน 7 จุดนะจ๊ะ!</div>
    <div class="diff-wrap" id="diffWrap">
      <div class="diff-panel" id="diffPanelLeft"></div>
      <div class="diff-panel" id="diffPanelRight"></div>
    </div>
    <div class="controls-row" id="diffControls" style="margin-top:16px; display:none;">
      <button class="bigbtn clear-btn" id="diffReplayBtn">🔁 เล่นใหม่</button>
    </div>
  </div>
</div>

<footer>ทำด้วยความรักสำหรับนักอ่านตัวน้อย 💛</footer>

<script>
/* ---------------- DATA ---------------- */
const WORDS = [
  {word:"หมา",   emoji:"🐶", cat:"สัตว์",   color:"#FFD166"},
  {word:"แมว",   emoji:"🐱", cat:"สัตว์",   color:"#FFD166"},
  {word:"หมู",   emoji:"🐷", cat:"สัตว์",   color:"#FFD166"},
  {word:"วัว",   emoji:"🐮", cat:"สัตว์",   color:"#FFD166"},
  {word:"ปลา",   emoji:"🐟", cat:"สัตว์",   color:"#FFD166"},
  {word:"ม้า",   emoji:"🐴", cat:"สัตว์",   color:"#FFD166"},
  {word:"ไก่",   emoji:"🐔", cat:"สัตว์",   color:"#FFD166"},
  {word:"เต่า",  emoji:"🐢", cat:"สัตว์",   color:"#FFD166"},
  {word:"ลิง",   emoji:"🐒", cat:"สัตว์",   color:"#FFD166"},
  {word:"เป็ด",  emoji:"🦆", cat:"สัตว์",   color:"#FFD166"},
  {word:"หนู",   emoji:"🐭", cat:"สัตว์",   color:"#FFD166"},
  {word:"ส้ม",   emoji:"🍊", cat:"ผลไม้",  color:"#7ED957"},
  {word:"มะนาว", emoji:"🍋", cat:"ผลไม้",  color:"#7ED957"},
  {word:"แตงโม", emoji:"🍉", cat:"ผลไม้",  color:"#7ED957"},
  {word:"กล้วย", emoji:"🍌", cat:"ผลไม้",  color:"#7ED957"},
  {word:"บ้าน",  emoji:"🏠", cat:"สิ่งของ", color:"#4EC5F1"},
  {word:"ดาว",   emoji:"⭐", cat:"สิ่งของ", color:"#4EC5F1"},
  {word:"ร่ม",   emoji:"☂️", cat:"สิ่งของ", color:"#4EC5F1"},
  {word:"แก้ว",  emoji:"🥛", cat:"สิ่งของ", color:"#4EC5F1"},
  {word:"ดินสอ", emoji:"✏️", cat:"สิ่งของ", color:"#4EC5F1"},

  {word:"กระต่าย", emoji:"🐰", cat:"มานีมานะ", color:"#FF8B94", hint:true},
  {word:"ผีเสื้อ",  emoji:"🦋", cat:"มานีมานะ", color:"#FF8B94", hint:true},
  {word:"เก้าอี้",  emoji:"🪑", cat:"มานีมานะ", color:"#FF8B94", hint:true},
  {word:"กระเป๋า", emoji:"🎒", cat:"มานีมานะ", color:"#FF8B94", hint:true},
  {word:"รองเท้า", emoji:"👞", cat:"มานีมานะ", color:"#FF8B94", hint:true},
  {word:"แว่นตา",  emoji:"👓", cat:"มานีมานะ", color:"#FF8B94", hint:true},
  {word:"ดอกไม้",  emoji:"🌸", cat:"มานีมานะ", color:"#FF8B94", hint:true},
  {word:"ต้นไม้",  emoji:"🌳", cat:"มานีมานะ", color:"#FF8B94", hint:true},
  {word:"เรือใบ",  emoji:"⛵", cat:"มานีมานะ", color:"#FF8B94", hint:true},
  {word:"ลูกโป่ง", emoji:"🎈", cat:"มานีมานะ", color:"#FF8B94", hint:true},

  {word:"มะพร้าว", emoji:"🥥", cat:"ดรุณศึกษา", color:"#4ED8C0", hint:true},
  {word:"แตงกวา", emoji:"🥒", cat:"ดรุณศึกษา", color:"#4ED8C0", hint:true},
  {word:"นกฮูก",   emoji:"🦉", cat:"ดรุณศึกษา", color:"#4ED8C0", hint:true},
  {word:"กระรอก",  emoji:"🐿️", cat:"ดรุณศึกษา", color:"#4ED8C0", hint:true},
  {word:"ปลาวาฬ",  emoji:"🐋", cat:"ดรุณศึกษา", color:"#4ED8C0", hint:true},
  {word:"หอยทาก", emoji:"🐌", cat:"ดรุณศึกษา", color:"#4ED8C0", hint:true},
  {word:"สายรุ้ง", emoji:"🌈", cat:"ดรุณศึกษา", color:"#4ED8C0", hint:true},
  {word:"ภูเขา",   emoji:"⛰️", cat:"ดรุณศึกษา", color:"#4ED8C0", hint:true},
  {word:"ทะเล",   emoji:"🌊", cat:"ดรุณศึกษา", color:"#4ED8C0", hint:true},
  {word:"ไข่ไก่",   emoji:"🥚", cat:"ดรุณศึกษา", color:"#4ED8C0", hint:true},

  {word:"พ่อ",     emoji:"👨", cat:"ครอบครัว", color:"#FFB84D"},
  {word:"แม่",     emoji:"👩", cat:"ครอบครัว", color:"#FFB84D"},
  {word:"ปู่",      emoji:"👴", cat:"ครอบครัว", color:"#FFB84D"},
  {word:"ย่า",     emoji:"👵", cat:"ครอบครัว", color:"#FFB84D"},
  {word:"ลุง",     emoji:"🧔", cat:"ครอบครัว", color:"#FFB84D"},
  {word:"ป้า",     emoji:"👩‍🦳", cat:"ครอบครัว", color:"#FFB84D"},
  {word:"หลาน",   emoji:"👶", cat:"ครอบครัว", color:"#FFB84D"},
  {word:"พี่ชาย",   emoji:"👦", cat:"ครอบครัว", color:"#FFB84D", hint:true},
  {word:"น้องสาว", emoji:"👧", cat:"ครอบครัว", color:"#FFB84D", hint:true},
  {word:"ครอบครัว", emoji:"👪", cat:"ครอบครัว", color:"#FFB84D", hint:true}
];
const MASCOTS = ["🐰","🐻","🐱","🐼"];
const COMBINING = new Set([0x0E31,0x0E34,0x0E35,0x0E36,0x0E37,0x0E38,0x0E39,0x0E47,0x0E48,0x0E49,0x0E4A,0x0E4B]);

/* สระเรียงจากง่ายไปยาก: อิ -> อี -> อึ -> อือ -> เอีย (อนุบาล3-ป.1 แบบมานีมานะ/ดรุณศึกษา) */
const SPOT_LEVELS = [
  {vowel:"ิ",    correct:{word:"กระดิ่ง", emoji:"🔔"}, wrong:{word:"กระเป๋า", emoji:"🎒"}},
  {vowel:"ิ",    correct:{word:"ปิ่นโต",  emoji:"🍱"}, wrong:{word:"ตะกร้า", emoji:"🧺"}},
  {vowel:"ี",    correct:{word:"กีต้าร์", emoji:"🎸"}, wrong:{word:"กลอง",   emoji:"🥁"}},
  {vowel:"ี",    correct:{word:"ปีกไก่",  emoji:"🍗"}, wrong:{word:"ไข่ไก่", emoji:"🥚"}},
  {vowel:"ึ",    correct:{word:"ตึกสูง",  emoji:"🏢"}, wrong:{word:"บ้าน",   emoji:"🏠"}},
  {vowel:"ึ",    correct:{word:"อึ่งอ่าง",emoji:"🐸"}, wrong:{word:"อูฐ",    emoji:"🐫"}},
  {vowel:"ือ",   correct:{word:"มือถือ",  emoji:"📱"}, wrong:{word:"โทรทัศน์",emoji:"📺"}},
  {vowel:"ือ",   correct:{word:"หนังสือ", emoji:"📖"}, wrong:{word:"ดินสอ",  emoji:"✏️"}},
  {vowel:"เอีย", correct:{word:"เตียงนอน",emoji:"🛏️"}, wrong:{word:"โซฟา",   emoji:"🛋️"}},
  {vowel:"เอีย", correct:{word:"เสียงเพลง",emoji:"🎵"}, wrong:{word:"กลอง",  emoji:"🥁"}}
];

let chosenMascot = MASCOTS[0];
let completed = new Set();
let currentIdx = null;
let answerSlots = [];   // characters placed so far
let tileState = [];     // {char, used}
let audioCtx = null;

let spotOrder = [];     // level indices in play order for this session
let spotPos = 0;
let spotScore = 0;
let spotCorrectSide = 'left';

/* ---------------- INIT ---------------- */
function init(){
  document.getElementById('totalCount1').textContent = WORDS.length;
  document.getElementById('totalCount2').textContent = WORDS.length;
  const mRow = document.getElementById('mascotRow');
  MASCOTS.forEach((m,i)=>{
    const btn = document.createElement('button');
    btn.className = 'mascot-opt' + (i===0 ? ' selected' : '');
    btn.textContent = m;
    btn.onclick = ()=>{
      document.querySelectorAll('.mascot-opt').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      chosenMascot = m;
      playTone(440,0.08);
    };
    mRow.appendChild(btn);
  });

  document.getElementById('startBtn').onclick = ()=>{
    document.getElementById('gridMascot').textContent = chosenMascot;
    showScreen('screen-grid');
    buildGrid();
  };
  document.getElementById('backBtn').onclick = ()=> { showScreen('screen-grid'); buildGrid(); };
  document.getElementById('clearBtn').onclick = resetTilesToBank;
  document.getElementById('listenBtn').onclick = speakWord;

  document.getElementById('spotStartBtn').onclick = startSpotGame;
  document.getElementById('spotBackBtn').onclick = ()=> showScreen('screen-mascot');

  document.getElementById('diffStartBtn1').onclick = ()=> startDiffGame(1);
  document.getElementById('diffStartBtn2').onclick = ()=> startDiffGame(2);

/* ---------------- GRID SCREEN ---------------- */
function buildGrid(){
  const container = document.getElementById('gridContainer');
  container.innerHTML = '';
  document.getElementById('scoreCount').textContent = completed.size;
  document.getElementById('scoreCountGame').textContent = completed.size;

  const cats = [...new Set(WORDS.map(w=>w.cat))];
  cats.forEach(cat=>{
    const title = document.createElement('div');
    title.className = 'cat-title';
    title.textContent = catLabel(cat);
    container.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'grid';
    WORDS.forEach((w,idx)=>{
      if(w.cat !== cat) return;
      const card = document.createElement('div');
      card.className = 'word-card';
      card.style.setProperty('--card-color', w.color);
      card.innerHTML = `<span class="emoji">${w.emoji}</span>` +
        (completed.has(idx) ? '<span class="star">⭐</span>' : '');
      card.onclick = ()=> startGame(idx);
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
}
function catLabel(cat){
  if(cat==='สัตว์') return '🐾 หมวดสัตว์';
  if(cat==='ผลไม้') return '🍎 หมวดผลไม้';
  if(cat==='สิ่งของ') return '🧸 หมวดสิ่งของ';
  if(cat==='มานีมานะ') return '📖 หมวดมานีมานะ';
  if(cat==='ดรุณศึกษา') return '📚 หมวดดรุณศึกษา';
  return '❤️ หมวดครอบครัว';
}

/* ---------------- GAME SCREEN ---------------- */
function startGame(idx){
  currentIdx = idx;
  const w = WORDS[idx];
  document.getElementById('gameMascot').textContent = chosenMascot;
  document.getElementById('promptEmoji').textContent = w.emoji;
  document.getElementById('speechBubble').textContent = 'เรียงตัวอักษรให้ถูกนะจ๊ะ!';
  document.getElementById('scoreCountGame').textContent = completed.size;
  showScreen('screen-game');
  setupPuzzle(w.word, w.hint);
}

function setupPuzzle(word, useHint){
  const chars = Array.from(word);
  answerSlots = new Array(chars.length).fill(null);

  let hintPositions = [];
  if(useHint && chars.length > 3){
    const hintCount = Math.min(3, chars.length - 1);
    hintPositions = shuffle(chars.map((c,i)=>i)).slice(0, hintCount).sort((a,b)=>a-b);
    hintPositions.forEach(pos=>{ answerSlots[pos] = chars[pos]; });
  }

  const remaining = chars.filter((c,i)=>!hintPositions.includes(i));
  let shuffled;
  do {
    shuffled = shuffle(remaining.slice());
  } while(remaining.length > 1 && shuffled.join('') === remaining.join(''));
  tileState = shuffled.map(c=>({char:c, used:false}));
  renderSlots(chars, hintPositions);
  renderTiles();
}

function displayChar(c){
  const code = c.codePointAt(0);
  return COMBINING.has(code) ? ('-' + c) : c;
}

function renderSlots(chars, hintPositions){
  const slotsEl = document.getElementById('slots');
  slotsEl.innerHTML = '';
  chars.forEach((c,i)=>{
    const s = document.createElement('div');
    s.className = 'slot';
    s.id = 'slot-'+i;
    if(hintPositions.includes(i)){
      s.classList.add('hint');
      s.textContent = displayChar(c);
    }
    slotsEl.appendChild(s);
  });
}

function renderTiles(){
  const tilesEl = document.getElementById('tiles');
  tilesEl.innerHTML = '';
  tileState.forEach((t,i)=>{
    const b = document.createElement('button');
    b.className = 'tile' + (t.used ? ' used' : '');
    b.textContent = displayChar(t.char);
    b.onclick = ()=> placeTile(i);
    tilesEl.appendChild(b);
  });
}

function placeTile(tileIdx){
  if(tileState[tileIdx].used) return;
  const nextEmpty = answerSlots.findIndex(s=>s===null);
  if(nextEmpty === -1) return;
  answerSlots[nextEmpty] = tileState[tileIdx].char;
  tileState[tileIdx].used = true;
  const slotEl = document.getElementById('slot-'+nextEmpty);
  slotEl.textContent = displayChar(tileState[tileIdx].char);
  slotEl.classList.add('filled');
  renderTiles();
  playTone(520,0.06);

  if(answerSlots.every(s=>s!==null)){
    setTimeout(checkAnswer, 250);
  }
}

function resetTilesToBank(){
  const w = WORDS[currentIdx];
  setupPuzzle(w.word, w.hint);
  document.getElementById('speechBubble').textContent = 'เรียงตัวอักษรให้ถูกนะจ๊ะ!';
}

function checkAnswer(){
  const w = WORDS[currentIdx];
  const guess = answerSlots.join('');
  if(guess === w.word){
    completed.add(currentIdx);
    document.getElementById('speechBubble').textContent = 'เก่งมาก! ถูกต้องจ้า 🎉';
    document.getElementById('scoreCountGame').textContent = completed.size;
    playSuccess();
    launchConfetti();
    setTimeout(()=>{ showScreen('screen-grid'); buildGrid(); }, 1600);
  } else {
    document.getElementById('speechBubble').textContent = 'ยังไม่ถูกนะ ลองอีกครั้ง! 💪';
    const slotsEl = document.getElementById('slots');
    slotsEl.classList.add('shake');
    playTone(180,0.25);
    setTimeout(()=>{
      slotsEl.classList.remove('shake');
      resetTilesToBank();
    }, 700);
  }
}

/* ---------------- SPOT-THE-PICTURE GAME ---------------- */
function buildSpotOrder(){
  const tiers = [...new Set(SPOT_LEVELS.map(l=>l.vowel))];
  let order = [];
  tiers.forEach(t=>{
    const idxs = SPOT_LEVELS.map((l,i)=>i).filter(i=>SPOT_LEVELS[i].vowel===t);
    order = order.concat(shuffle(idxs));
  });
  return order;
}

function startSpotGame(){
  document.getElementById('spotMascot').textContent = chosenMascot;
  spotOrder = buildSpotOrder();
  spotPos = 0;
  spotScore = 0;
  document.getElementById('spotLevelTotal').textContent = spotOrder.length;
  showScreen('screen-spot');
  loadSpotLevel();
}

function loadSpotLevel(){
  if(spotPos >= spotOrder.length){
    finishSpotGame();
    return;
  }
  document.getElementById('spotLevelNum').textContent = spotPos + 1;
  document.getElementById('spotSpeech').textContent = 'คำนี้คือรูปไหนนะ?';

  const level = SPOT_LEVELS[spotOrder[spotPos]];
  spotCorrectSide = Math.random() < 0.5 ? 'left' : 'right';
  const leftItem = spotCorrectSide === 'left' ? level.correct : level.wrong;
  const rightItem = spotCorrectSide === 'right' ? level.correct : level.wrong;

  const body = document.getElementById('spotBody');
  body.innerHTML = `
    <div class="spot-word pop-in">${level.correct.word}</div>
    <div class="spot-row">
      <div class="spot-card" id="spotCard-left">${leftItem.emoji}</div>
      <div class="spot-card" id="spotCard-right">${rightItem.emoji}</div>
    </div>
  `;
  document.getElementById('spotCard-left').onclick = ()=> pickSpot('left', leftItem.word);
  document.getElementById('spotCard-right').onclick = ()=> pickSpot('right', rightItem.word);
}

function pickSpot(side, word){
  speakText(word);
  const cardEl = document.getElementById('spotCard-'+side);
  if(side === spotCorrectSide){
    spotScore++;
    cardEl.classList.add('is-correct');
    document.getElementById('spotSpeech').textContent = 'เก่งมาก! ถูกต้องจ้า 🎉';
    playSuccess();
    launchConfetti();
    setTimeout(()=>{ spotPos++; loadSpotLevel(); }, 1400);
  } else {
    cardEl.classList.add('is-wrong');
    document.getElementById('spotSpeech').textContent = 'ยังไม่ใช่ ลองดูใหม่นะ! 💪';
    playTone(180,0.25);
    const wrapEl = document.querySelector('#screen-spot .game-wrap');
    wrapEl.classList.add('shake');
    setTimeout(()=>{
      wrapEl.classList.remove('shake');
      cardEl.classList.remove('is-wrong');
    }, 600);
  }
}

function finishSpotGame(){
  const body = document.getElementById('spotBody');
  document.getElementById('spotSpeech').textContent = 'จบเกมแล้วจ้า เก่งมากเลย! 🌟';
  body.innerHTML = `
    <div class="spot-done pop-in">ทายถูก ${spotScore}/${spotOrder.length} รูป 🎉</div>
    <button class="bigbtn" id="spotReplayBtn">🔁 เล่นอีกครั้ง</button>
  `;
  document.getElementById('spotReplayBtn').onclick = startSpotGame;
  launchConfetti();
}

const FILLER_VARIANTS = {

  ],

    [{emoji:"🎀",alt:null},{emoji:"🌷",alt:"🌻"},{emoji:"☁️",alt:"🌥️"},{emoji:"🍄",alt:null},{emoji:"⭐",alt:"🌟"},{emoji:"🌱",alt:"🍀"}]
  ],
  vehicnature: [
    [{emoji:"🦋",alt:null},{emoji:"🦋",alt:null},{emoji:"⭐",alt:"🌟"},{emoji:"✨",alt:null},{emoji:"☁️",alt:"🌥️"},{emoji:"🌱",alt:"🍀"}],
    [{emoji:"🦋",alt:null},{emoji:"🎀",alt:null},{emoji:"⭐",alt:"🌟"},{emoji:"☁️",alt:"🌥️"},{emoji:"🍄",alt:null},{emoji:"✨",alt:null}]
  ],
  foodetc: [
    [{emoji:"🌈",alt:null},{emoji:"🦋",alt:null},{emoji:"🌸",alt:"🌼"},{emoji:"⭐",alt:"🌟"},{emoji:"☁️",alt:"🌥️"},{emoji:"✨",alt:null}],
    [{emoji:"🎀",alt:null},{emoji:"🌷",alt:"🌻"},{emoji:"☁️",alt:"🌥️"},{emoji:"🍄",alt:null},{emoji:"⭐",alt:"🌟"},{emoji:"🌱",alt:"🍀"}]

/* พื้นหลังฉากสลับสีสวยๆ ไม่ให้หน้าตาซ้ำกันทุกด่าน */
const DIFF_BG_THEMES = [
  "linear-gradient(180deg,#BEE7FF 0%,#EAFBE0 65%,#CFF0B0 100%)",
  "linear-gradient(180deg,#FFE3EC 0%,#FFF3D6 60%,#FFE8B8 100%)",
  "linear-gradient(180deg,#E0F7FF 0%,#F0E6FF 60%,#E9D9FF 100%)",
  "linear-gradient(180deg,#FFF9E0 0%,#E8FFEE 60%,#D9FFE3 100%)",
  "linear-gradient(180deg,#E6F0FF 0%,#FDE8FF 60%,#FFD9F0 100%)"
];
/* 16 ตำแหน่ง (%): 6 ของตกแต่ง + 9 คำศัพท์หลัก + 1 คำสำรอง (ใช้กับ diff แบบ "เพิ่มรูป") */
const DIFF_POSITIONS = [
  {x:10,y:10},{x:30,y:8},{x:50,y:12},{x:70,y:9},{x:90,y:14},
  {x:15,y:32},{x:38,y:30},{x:62,y:33},{x:85,y:30},
  {x:12,y:55},{x:35,y:58},{x:58,y:55},{x:82,y:58},
  {x:20,y:82},{x:45,y:85},{x:70,y:82}
];

let diffGameNum = 1;
let diffLevelIdx = 0;
let diffBaseItems = [];
let diffLevelDiffs = [];
let diffFoundSet = new Set();
let diffBgTheme = "";

function diffLevelCount(gameNum, levelIdx){
  const startVal = gameNum === 1 ? 4 : 8;
  const endVal = gameNum === 1 ? 8 : 12;
  return Math.round(startVal + (endVal - startVal) * levelIdx / 9);
}

function startDiffGame(gameNum){
  diffGameNum = gameNum;
  diffLevelIdx = 0;
  document.getElementById('diffControls').style.display = 'none';
  document.getElementById('diffWrap').style.display = 'flex';
  showScreen('screen-diff');
  loadDiffLevel();
}

function loadDiffLevel(){
  if(diffLevelIdx >= 10){
    finishDiffGame();
    return;
  }
  diffFoundSet = new Set();
  document.getElementById('diffGameLabel').textContent = 'จับผิดภาพ ด่านที่ ' + diffGameNum;
  document.getElementById('diffLevelNum').textContent = diffLevelIdx + 1;

  const diffCount = diffLevelCount(diffGameNum, diffLevelIdx);
  const catKey = DIFF_CATS[diffLevelIdx % DIFF_CATS.length];
  document.getElementById('diffCatLabel').textContent = DIFF_CAT_LABELS[catKey];
  document.getElementById('diffSpeech').textContent = `หาจุดที่ไม่เหมือนกัน ${diffCount} จุดนะจ๊ะ!`;

  const words = DIFF_WORDS[catKey];
  const baseWords = words.slice(0,9).map((w,i)=>({id:'w'+i, emoji:w.e, label:w.w, alt:null}));
  const reservedWord = {id:'wR', emoji:words[9].e, label:words[9].w, alt:null};

  const variantIdx = Math.floor(diffLevelIdx / DIFF_CATS.length) % FILLER_VARIANTS[catKey].length;
  const fillerItems = FILLER_VARIANTS[catKey][variantIdx].map((f,i)=>({id:'f'+i, emoji:f.emoji, label:null, alt:f.alt}));

  diffBgTheme = DIFF_BG_THEMES[diffLevelIdx % DIFF_BG_THEMES.length];

  const positions = shuffle(DIFF_POSITIONS.slice());
  const allSlots = fillerItems.concat(baseWords);
  allSlots.forEach((it,i)=>{
    it.x = positions[i].x; it.y = positions[i].y;
    it.size = it.label ? 34 : 30; it.rotate = 0;
  });
  reservedWord.x = positions[allSlots.length].x;
  reservedWord.y = positions[allSlots.length].y;
  reservedWord.size = 34; reservedWord.rotate = 0;

  diffBaseItems = allSlots;
  diffLevelDiffs = buildDiffsForLevel(allSlots, reservedWord, diffCount);
  document.getElementById('diffTotal').textContent = diffLevelDiffs.length;
  document.getElementById('diffFound').textContent = 0;
  renderDiffLevelScene();
}

function buildDiffsForLevel(baseItems, reservedItem, diffCount){
  const eligible = shuffle(baseItems.slice());
  const typeCycle = ['move','resize','rotate','remove'];
  const nonAddCount = Math.max(0, diffCount - 1);
  const diffs = [];
  for(let i=0; i<nonAddCount; i++){
    const item = eligible[i];
    let type = typeCycle[i % typeCycle.length];
    if(item.alt && i % 4 === 3) type = 'swap';
    diffs.push(makeDiffFromItem(item, type, i));
  }
  diffs.push({id:'add-'+reservedItem.id, type:'add', item:reservedItem});
  return diffs;
}

function makeDiffFromItem(item, type, i){
  const id = 'd'+i+'-'+item.id;
  if(type==='swap') return {id, type, itemId:item.id, newEmoji:item.alt};
  if(type==='resize') return {id, type, itemId:item.id, newSize:Math.round((item.size||30)*1.6)};
  if(type==='rotate') return {id, type, itemId:item.id, newRotate:25};
  if(type==='move'){
    const nx = Math.min(92, Math.max(8, item.x + (i%2===0 ? -18 : 18)));
    const ny = Math.min(92, Math.max(8, item.y + (i%2===0 ? 14 : -14)));
    return {id, type, itemId:item.id, newX:nx, newY:ny};
  }
  return {id, type:'remove', itemId:item.id};
}

function renderDiffLevelScene(){
  const leftItems = diffBaseItems.map(it=>({...it}));
  let rightItems = diffBaseItems.map(it=>({...it}));

  diffLevelDiffs.forEach(diff=>{
    if(diff.type==='swap'){
      const it = rightItems.find(i=>i.id===diff.itemId);
      if(it) it.emoji = diff.newEmoji;
    } else if(diff.type==='remove'){
      rightItems = rightItems.filter(i=>i.id!==diff.itemId);
    } else if(diff.type==='add'){
      rightItems.push({...diff.item});
    } else if(diff.type==='resize'){
      const it = rightItems.find(i=>i.id===diff.itemId);
      if(it) it.size = diff.newSize;
    } else if(diff.type==='rotate'){
      const it = rightItems.find(i=>i.id===diff.itemId);
      if(it) it.rotate = diff.newRotate;
    } else if(diff.type==='move'){
      const it = rightItems.find(i=>i.id===diff.itemId);
      if(it){ it.x = diff.newX; it.y = diff.newY; }
    }
  });

  buildDiffLevelPanel('diffPanelLeft', leftItems, 'left');
  buildDiffLevelPanel('diffPanelRight', rightItems, 'right');
}

function buildDiffLevelPanel(panelId, items, side){
  const panel = document.getElementById(panelId);
  panel.innerHTML = '';
  panel.style.background = diffBgTheme;
  items.forEach(it=>{
    const wrap = document.createElement('div');
    wrap.className = 'diff-item';
    wrap.style.left = it.x + '%';
    wrap.style.top = it.y + '%';
    wrap.innerHTML = `<span style="font-size:${it.size||30}px; display:block; transform:rotate(${it.rotate||0}deg);">${it.emoji}</span>` +
      (it.label ? `<span class="diff-item-label">${it.label}</span>` : '');
    panel.appendChild(wrap);
  });

  diffLevelDiffs.forEach(diff=>{
    const base = diffBaseItems.find(i=>i.id===diff.itemId) || diff.item;
    let pos = {x: base.x, y: base.y};
    if(diff.type==='move' && side==='right'){ pos = {x:diff.newX, y:diff.newY}; }
    const hot = document.createElement('div');
    hot.className = 'diff-hotspot' + (diffFoundSet.has(diff.id) ? ' found' : '');
    hot.style.left = pos.x + '%';
    hot.style.top = pos.y + '%';
    hot.onclick = ()=> clickDiffLevel(diff.id);
    panel.appendChild(hot);
  });
}

function clickDiffLevel(diffId){
  if(diffFoundSet.has(diffId)) return;
  diffFoundSet.add(diffId);
  document.getElementById('diffFound').textContent = diffFoundSet.size;
  playTone(520,0.08);
  renderDiffLevelScene();

  if(diffFoundSet.size === diffLevelDiffs.length){
    document.getElementById('diffSpeech').textContent = 'เก่งมาก! เจอครบแล้ว 🎉';
    playSuccess();
    launchConfetti();
    setTimeout(()=>{ diffLevelIdx++; loadDiffLevel(); }, 1600);
  } else {
    document.getElementById('diffSpeech').textContent = `เจอแล้ว ${diffFoundSet.size}/${diffLevelDiffs.length} จุด ลองหาต่อนะ!`;
  }
}

function finishDiffGame(){
  document.getElementById('diffSpeech').textContent = 'จบเกมจับผิดภาพด่านที่ ' + diffGameNum + ' แล้วจ้า เก่งมากเลย! 🌟';
  document.getElementById('diffWrap').style.display = 'none';
  document.getElementById('diffCatLabel').textContent = '';
  document.getElementById('diffControls').style.display = 'flex';
  launchConfetti();
}

/* ---------------- AUDIO ---------------- */
function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){}
  }
}
function playTone(freq, dur){
  ensureAudio();
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = freq;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}
function playSuccess(){
  [523,659,784].forEach((f,i)=> setTimeout(()=>playTone(f,0.25), i*150));
}
function speakWord(){
  speakText(WORDS[currentIdx].word);
}
function speakText(text){
  try{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'th-TH';
    u.rate = 0.8;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }catch(e){}
  playTone(400,0.05);
}

/* ---------------- CONFETTI ---------------- */
function launchConfetti(){
  const colors = ['#FF6FA5','#FFD166','#4EC5F1','#7ED957','#B48CFF','#FF9A5A'];
  for(let i=0;i<40;i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.animation = `fall ${1+Math.random()*1.2}s linear forwards`;
    c.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 2500);
  }
}

/* ---------------- UTIL ---------------- */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

init();
